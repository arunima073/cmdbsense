<div class="panel panel-default">

    <div class="panel-heading">
        <h3>CMDB Review Detail</h3>
    </div>

    <div class="panel-body" ng-if="data.match.sys_id">

        <p><strong>CI A:</strong> {{data.match.ci_a}}</p>

        <p><strong>CI B:</strong> {{data.match.ci_b}}</p>

        <p><strong>Score:</strong> {{data.match.score}}</p>

        <p><strong>Decision:</strong> {{data.match.decision}}</p>

        <p><strong>Computed:</strong> {{data.match.computed_at}}</p>

    </div>

    <div class="panel-body" ng-if="!data.match.sys_id">

        No Match Score found.

    </div>

</div>
