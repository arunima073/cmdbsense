<div class="panel panel-default">


<div class="panel-heading">

<h3>
CMDB Review Detail
</h3>

</div>


<div class="panel-body">


<p>
<b>Score:</b> {{data.match.score}}
</p>

<p>
<b>Decision:</b> {{data.match.decision}}
</p>


<hr>


<div class="row">


<!-- CI A -->

<div class="col-md-5">

<h4>
CI A - {{data.match.ci_a}}
</h4>


<table class="table">

<tr>
<th>Attribute</th>
<th>Value</th>
</tr>


<tr ng-repeat="a in data.attributes">

<td>
{{a.label}}
</td>


<td ng-class="a.status">

{{a.ci_a || '-'}}

</td>


</tr>


</table>

</div>



<!-- Signals -->

<div class="col-md-2">


<h4>
Signals
</h4>


<table class="table">


<tr ng-repeat="(key,value) in data.signals">

<td>
{{key}}
</td>

<td>
{{value}}
</td>

</tr>


</table>


</div>




<!-- CI B -->

<div class="col-md-5">


<h4>
CI B - {{data.match.ci_b}}
</h4>


<table class="table">

<tr>
<th>Attribute</th>
<th>Value</th>
</tr>


<tr ng-repeat="a in data.attributes">


<td>
{{a.label}}
</td>


<td ng-class="a.status">

{{a.ci_b || '-'}}

</td>


</tr>


</table>


</div>



</div>


</div>


</div>
